<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>視覺認知訓練_V24_無限循環版</title>
    <style>
        :root { --primary: #FF9500; --success: #28a745; --home: #007AFF; --bg: #000; --line: #ffeb3b; }
        * { -webkit-touch-callout: none; -webkit-user-select: none; touch-action: none; box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background: var(--bg); font-family: sans-serif; position: fixed; }
        
        #task-hint { position: absolute; top: 0; left: 0; width: 100%; height: 12vh; background: #fff; display: flex; justify-content: center; align-items: center; font-size: 2.5rem; font-weight: bold; z-index: 100; border-bottom: 8px solid var(--primary); }
        .replay-btn { margin-left: 20px; background: #eee; border: 4px solid #ccc; border-radius: 50%; width: 60px; height: 60px; font-size: 1.8rem; cursor: pointer; }
        #home-btn { position: absolute; top: 15px; right: 20px; z-index: 500; background: var(--home); color: white; border: none; border-radius: 10px; padding: 12px 20px; font-size: 1.2rem; }
        
        #game-stage { position: absolute; top: 12vh; left: 0; width: 100vw; height: 88vh; display: flex; z-index: 10; background: #000; }
        .stage-half { flex: 1; height: 100%; display: flex; justify-content: center; align-items: center; position: relative; }
        #center-line { position: absolute; left: 50%; top: 5%; height: 90%; width: 10px; background: var(--line); transform: translateX(-50%); z-index: 20; display: none; box-shadow: 0 0 15px var(--line); }

        .food-card { 
            position: relative; background: #fff; border-radius: 40px; border: 18px solid var(--primary); 
            width: 45vw; height: 75vh; max-width: 650px; max-height: 520px;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
            z-index: 30;
        }
        .food-card img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        /* 最高亮度成功層 */
        #dim-layer { position: fixed; inset: 0; background: rgba(0,0,0,0.93); z-index: 9000; display: none; }
        #success-container { position: fixed; inset: 0; z-index: 9999; display: none; justify-content: center; align-items: center; pointer-events: none; }
        
        .focus-center { 
            position: relative !important; transform: scale(1.1) !important; 
            z-index: 9999 !important; border-color: var(--success) !important; 
            width: 85vw !important; height: 80vh !important;
            box-shadow: 0 0 100px rgba(40,167,69,0.8) !important;
            filter: brightness(100%) !important;
        }
        
        .progress-bar { position: absolute; bottom: 0; left: 0; width: 0%; height: 35px; background: #ffeb3b; z-index: 100; }

        /* 設定面板 */
        #settings-panel { position: fixed; inset: 0; background: #fdf6e3; z-index: 3000; padding: 20px; display: flex; flex-direction: column; align-items: center; overflow-y: auto; }
        .setting-section { width: 95%; max-width: 800px; background: white; padding: 25px; margin: 10px 0; border-radius: 25px; }
        .lv-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
        .lv-item.active { background: #fff9e6; border-radius: 15px; border: 2px solid var(--primary); }
        .type-btn { flex: 1; padding: 25px; font-size: 1.8rem; margin: 0 10px; border-radius: 20px; border: 5px solid #ddd; background: #fff; }
        .type-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        .start-btn { width: 80%; padding: 30px; background: var(--success); color: #fff; border-radius: 50px; font-size: 2.5rem; font-weight: bold; margin-top: 30px; }
    </style>
</head>
<body>

    <audio id="cheer-sound" src="cheer.mp3" preload="auto"></audio>
    <div id="dim-layer"></div>
    <div id="success-container"></div>

    <button id="home-btn" onclick="location.reload()" style="display:none;">🏠 返回</button>
    
    <div id="task-hint">找出：<span id="target-name" style="color:var(--primary); margin-left:15px;">---</span><button class="replay-btn" id="btn-voice">🔊</button></div>

    <div id="game-stage">
        <div id="center-line"></div>
        <div id="left-zone" class="stage-half"></div>
        <div id="right-zone" class="stage-half"></div>
    </div>

    <div id="settings-panel">
        <h1>視覺認知訓練 V24</h1>
        <div class="setting-section">
            <h3>1. 選擇類別</h3>
            <div style="display:flex;">
                <button class="type-btn active" id="type-cn" onclick="cfg.type='chinese'; updateUI();">中式</button>
                <button class="type-btn" id="type-ws" onclick="cfg.type='western'; updateUI();">西式</button>
            </div>
        </div>
        <div class="setting-section">
            <h3>2. 選擇等級</h3>
            <div id="lv-list">
                <div class="lv-item active" onclick="setLv(1)">Lv.1 單一極大化</div>
                <div class="lv-item" onclick="setLv(2)">Lv.2 二選一 (空白)</div>
                <div class="lv-item" onclick="setLv(3)">Lv.3 二選一 (雜物)</div>
                <div class="lv-item" onclick="setLv(4)">Lv.4 二選一 (中西)</div>
                <div class="lv-item" onclick="setLv(5)">Lv.5 拖拽配對</div>
            </div>
        </div>
        <div class="setting-section">
            <h3>3. 計時：<span id="time-txt">1.0</span> 秒</h3>
            <input type="range" id="time-range" min="0.3" max="2.5" step="0.1" value="1.0" style="width:100%; height:50px;" oninput="updateTimeUI(this.value)">
        </div>
        <button class="start-btn" onclick="begin()">開始訓練</button>
    </div>

    <script>
        const foodLib = {
            chinese: [{n:'牛肉球', i:'food1.png'}, {n:'腸粉', i:'food2.png'}, {n:'叉燒包', i:'food3.png'}, {n:'白粥', i:'food4.png'}],
            western: [{n:'薄餅', i:'pizza.png'}, {n:'漢堡包', i:'1food.png'}, {n:'薯條', i:'2food.png'}, {n:'可樂', i:'cola.png'}]
        };
        let cfg = { lv: 1, time: 1000, type: 'chinese' };
        let currentIdx = 0, currentFoods = [], lastTarget = "", timer = null, lock = false;

        function setLv(l) { cfg.lv = l; updateUI(); }
        function updateTimeUI(v) { cfg.time = v * 1000; document.getElementById('time-txt').innerText = v; }
        
        function updateUI() {
            document.getElementById('type-cn').className = cfg.type === 'chinese' ? 'type-btn active' : 'type-btn';
            document.getElementById('type-ws').className = cfg.type === 'western' ? 'type-btn active' : 'type-btn';
            const items = document.querySelectorAll('.lv-item');
            items.forEach((item, idx) => { item.className = (idx + 1 === cfg.lv) ? 'lv-item active' : 'lv-item'; });
        }

        function speak(t) { window.speechSynthesis.cancel(); let m = new SpeechSynthesisUtterance(t); m.lang='zh-HK'; window.speechSynthesis.speak(m); }
        
        function begin() {
            document.getElementById('cheer-sound').play().then(()=>document.getElementById('cheer-sound').pause()).catch(()=>{});
            document.getElementById('settings-panel').style.display = 'none';
            document.getElementById('home-btn').style.display = 'block';
            resetRound();
            spawn();
        }

        //
        function resetRound() { 
            currentFoods = [...foodLib[cfg.type]].sort(() => Math.random() - 0.5); 
            currentIdx = 0; 
        }

        function spawn() {
            // 如果超過長度，自動洗牌循環
            if (currentIdx >= currentFoods.length) resetRound();
            
            lock = false;
            const L = document.getElementById('left-zone');
            const R = document.getElementById('right-zone');
            const div = document.getElementById('center-line');
            const dim = document.getElementById('dim-layer');
            const suc = document.getElementById('success-container');
            
            L.innerHTML = ''; R.innerHTML = ''; dim.style.display = 'none'; suc.innerHTML = ''; suc.style.display = 'none';
            
            const target = currentFoods[currentIdx];
            lastTarget = target.n;
            document.getElementById('target-name').innerText = lastTarget;
            speak((cfg.lv===5?"請配對":"請找出") + lastTarget);

            if (cfg.lv === 1) {
                div.style.display = 'none'; R.style.display = 'none';
                createCard(target, true, L, true);
            } else if (cfg.lv === 5) {
                div.style.display = 'none'; R.style.display = 'flex';
                initMatch(target);
            } else {
                div.style.display = 'block'; R.style.display = 'flex';
                let items = [{d:target, c:true}];
                if(cfg.lv===2) items.push({d:{n:'空', i:'none'}, c:false});
                if(cfg.lv===3) items.push({d:{n:'雜', i:'junk'}, c:false});
                if(cfg.lv===4) {
                    let o = cfg.type==='chinese'?foodLib.western:foodLib.chinese;
                    items.push({d:o[Math.floor(Math.random()*4)], c:false});
                }
                items.sort(()=>Math.random()-0.5);
                createCard(items[0].d, items[0].c, L);
                createCard(items[1].d, items[1].c, R);
            }
        }

        function createCard(data, isCorrect, container, isFull=false) {
            const card = document.createElement('div');
            card.className = 'food-card';
            if(isFull) card.style.width = '85vw';

            if(data.i === 'none') card.innerHTML = '<div style="font-size:8rem;color:#eee">?</div>';
            else if(data.i === 'junk') card.innerHTML = '<div style="font-size:10rem;color:yellow">★</div>';
            else card.innerHTML = `<img src="${data.i}"><div class="progress-bar"></div>`;

            //
            const startAction = (e) => {
                if (lock) return;
                if (!isCorrect) { 
                    if(e.type === 'touchstart' || e.type === 'mousedown') speak("唔係呢個"); 
                    return; 
                }
                const bar = card.querySelector('.progress-bar');
                if (bar && bar.style.width !== '100%') {
                    bar.style.transition = `width ${cfg.time}ms linear`;
                    bar.style.width = '100%';
                    timer = setTimeout(() => {
                        lock = true;
                        document.getElementById('cheer-sound').play();
                        document.getElementById('dim-layer').style.display = 'block';
                        const suc = document.getElementById('success-container');
                        suc.style.display = 'flex';
                        const clone = card.cloneNode(true);
                        clone.classList.add('focus-center');
                        suc.appendChild(clone);
                        speak(data.n + "，答啱喇！");
                        setTimeout(() => { currentIdx++; spawn(); }, 3000);
                    }, cfg.time);
                }
            };

            const endAction = () => {
                if (lock) return;
                clearTimeout(timer);
                const bar = card.querySelector('.progress-bar');
                if (bar) { bar.style.transition = 'none'; bar.style.width = '0%'; }
            };

            // 監聽多種事件達成「掃描即觸發」
            card.addEventListener('pointerenter', (e) => { if(e.pointerType === 'touch' || e.pointerType === 'mouse') startAction(e); });
            card.addEventListener('touchstart', (e) => { e.preventDefault(); startAction(e); });
            card.addEventListener('touchend', endAction);
            card.addEventListener('pointerleave', endAction);
            card.addEventListener('mousedown', startAction);
            card.addEventListener('mouseup', endAction);

            container.appendChild(card);
        }

        function initMatch(target) {
            const L = document.getElementById('left-zone'), R = document.getElementById('right-zone'), S = document.getElementById('game-stage');
            const box = document.createElement('div'); box.className = 'food-card'; box.style.borderStyle = 'dashed';
            box.innerHTML = `<img src="${target.i}" style="opacity:0.2">`;
            const drag = document.createElement('div'); drag.className = 'food-card';
            drag.innerHTML = `<img src="${target.i}">`;
            L.appendChild(box); R.appendChild(drag);

            let active = false, ox, oy;
            const move = (e) => {
                if(!active) return;
                let cX = e.touches ? e.touches[0].clientX : e.clientX;
                let cY = e.touches ? e.touches[0].clientY : e.clientY;
                if(drag.parentNode !== S) S.appendChild(drag);
                drag.style.position = 'absolute';
                drag.style.left = (cX - ox) + 'px'; drag.style.top = (cY - oy - S.offsetTop) + 'px';
                drag.style.zIndex = '3000';
            };
            const up = (e) => {
                if(!active) return; active = false;
                let eX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
                let eY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
                let r = box.getBoundingClientRect();
                if(eX > r.left && eX < r.right && eY > r.top && eY < r.bottom) {
                    lock = true;
                    document.getElementById('cheer-sound').play();
                    document.getElementById('dim-layer').style.display = 'block';
                    const suc = document.getElementById('success-container');
                    suc.style.display = 'flex';
                    const clone = drag.cloneNode(true);
                    clone.classList.add('focus-center');
                    suc.appendChild(clone);
                    drag.style.display = 'none';
                    speak("好叻喎！");
                    setTimeout(() => { currentIdx++; spawn(); }, 3000);
                } else {
                    R.appendChild(drag); drag.style.position='relative'; drag.style.left='0'; drag.style.top='0';
                }
            };
            drag.addEventListener('touchstart', (e)=>{
                active=true; let t=e.touches[0]; let rect = drag.getBoundingClientRect();
                ox = t.clientX - rect.left; oy = t.clientY - rect.top;
                drag.style.transition='none';
            });
            window.addEventListener('touchmove', move, {passive:false});
            window.addEventListener('touchend', up);
        }

        document.getElementById('btn-voice').onclick = () => speak(lastTarget);
    </script>
</body>
</html>
