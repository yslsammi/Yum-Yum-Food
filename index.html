<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>視覺認知訓練_中西式食物</title>
    <style>
        :root { --primary: #FF9500; --success: #28a745; --home: #007AFF; --bg: #000; }
        * { -webkit-touch-callout: none; -webkit-user-select: none; touch-action: none; box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background: var(--bg); font-family: sans-serif; }
        
        #task-hint { position: absolute; top: 0; left: 0; width: 100%; height: 12vh; background: white; display: flex; justify-content: center; align-items: center; font-size: 2.2rem; font-weight: bold; z-index: 100; border-bottom: 5px solid var(--primary); }
        .replay-btn { margin-left: 15px; background: #eee; border: 3px solid #ccc; border-radius: 50%; width: 60px; height: 60px; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; }
        #home-btn { position: absolute; top: 15px; right: 15px; z-index: 200; background: var(--home); color: white; border: none; border-radius: 10px; padding: 10px 20px; font-size: 1.2rem; display: none; }
        
        #game-stage { position: absolute; top: 12vh; left: 0; width: 100%; height: 88vh; display: flex; justify-content: center; align-items: center; gap: 8vw; padding: 20px; z-index: 50; }

        .food-card { 
            position: relative; background: white; border-radius: 30px; border: 10px solid var(--primary); 
            width: 40vw; height: 50vh; max-width: 450px; max-height: 350px;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); flex-shrink: 0; touch-action: none;
        }
        .food-card img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        .focus-center { 
            position: absolute !important; top: 50% !important; left: 50% !important; 
            transform: translate(-50%, -50%) scale(1.15) !important; 
            z-index: 2000 !important; border-color: var(--success) !important; 
            width: 70vw !important; height: 70vh !important;
            max-width: 800px !important; max-height: 550px !important;
        }
        .dimmed { background: rgba(0,0,0,0.95) !important; }
        .progress-bar { position: absolute; bottom: 0; left: 0; width: 0%; height: 15px; background: #ffeb3b; z-index: 10; }

        /* 設定面板 */
        #settings-panel { position: fixed; inset: 0; background: #fdf6e3; z-index: 3000; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .setting-section { width: 95%; max-width: 800px; background: white; padding: 20px; margin: 10px 0; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .lv-item { display: flex; align-items: center; width: 100%; border-bottom: 1px solid #eee; padding: 12px 0; cursor: pointer; }
        .lv-item.active { background: #fff9e6; }
        .lv-btn { padding: 10px 18px; border: 2px solid #ddd; border-radius: 10px; background: #fff; font-size: 1rem; font-weight: bold; min-width: 70px; margin-right: 15px; }
        .lv-item.active .lv-btn { background: var(--primary); color: white; }
        .type-btn { flex: 1; padding: 20px; font-size: 1.5rem; font-weight: bold; border-radius: 15px; border: 4px solid #ddd; background: white; margin: 0 10px; }
        .type-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .start-btn { width: 90%; max-width: 450px; padding: 25px; background: var(--success); color: white; border: none; border-radius: 50px; font-size: 2.2rem; font-weight: bold; margin: 30px 0; }
        
        #time-slider { width: 85%; height: 40px; margin: 15px 0; }
    </style>
</head>
<body>

    <audio id="cheer-sound" src="cheer.mp3"></audio>
    <button id="home-btn" onclick="goHome()">🏠 返回設定</button>
    <div id="task-hint">
        <span id="instruction">找出：</span><span id="target-name">---</span>
        <button class="replay-btn" onclick="speakTask()">🔊</button>
    </div>
    <div id="game-stage"></div>

    <div id="settings-panel">
        <h1>視覺認知訓練_中西式食物</h1>
        <div class="setting-section">
            <h3>1. 選擇類別</h3>
            <div style="display:flex; width:100%;">
                <button class="type-btn active" id="btn-chinese" onclick="setType('chinese')">中式點心</button>
                <button class="type-btn" id="btn-western" onclick="setType('western')">西式快餐</button>
            </div>
        </div>
        <div class="setting-section">
            <h3>2. 選擇等級</h3>
            <div class="lv-item active" onclick="setLv(1, this)"><button class="lv-btn">Lv.1</button><h4>單一選項</h4></div>
            <div class="lv-item" onclick="setLv(2, this)"><button class="lv-btn">Lv.2</button><h4>二選一 (空白)</h4></div>
            <div class="lv-item" onclick="setLv(4, this)"><button class="lv-btn">Lv.4</button><h4>二選一 (中西對比)</h4></div>
            <div class="lv-item" onclick="setLv(6, this)" style="background:#f0f7ff;"><button class="lv-btn">Lv.6</button><h4>配對模式 (拖放)</h4></div>
        </div>
        <div class="setting-section" style="text-align: center;">
            <h3>3. 注視時間：<span id="time-val">1.0</span> 秒</h3>
            <input type="range" id="time-slider" min="0.3" max="2.5" step="0.1" value="1.0" oninput="updateTime(this.value)">
        </div>
        <button class="start-btn" onclick="begin()">開始訓練</button>
    </div>

    <script>
        const foodLib = {
            chinese: [{name:'牛肉球', img:'food1.png'}, {name:'腸粉', img:'food2.png'}, {name:'叉燒包', img:'food3.png'}, {name:'白粥', img:'food4.png'}],
            western: [{name:'薄餅', img:'pizza.png'}, {name:'漢堡包', img:'1food.png'}, {name:'薯條', img:'2food.png'}, {name:'可樂', img:'cola.png'}]
        };

        let cfg = { lv: 1, time: 1000, type: 'chinese' };
        let currentIdx = 0, currentFoods = [], gazeTimer = null, isTransitioning = false, lastTarget = "";

        function setLv(v, b) {
            cfg.lv = v;
            document.querySelectorAll('.lv-item').forEach(i => i.classList.remove('active'));
            b.classList.add('active');
        }
        function setType(t) {
            cfg.type = t;
            document.getElementById('btn-chinese').classList.toggle('active', t === 'chinese');
            document.getElementById('btn-western').classList.toggle('active', t === 'western');
        }
        function updateTime(v) { cfg.time = v * 1000; document.getElementById('time-val').innerText = v; }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-HK';
            msg.rate = 0.8;
            window.speechSynthesis.speak(msg);
        }
        function speakTask() { speak((cfg.lv === 6 ? "請配對" : "請找出") + lastTarget); }

        function goHome() {
            clearTimeout(gazeTimer);
            document.getElementById('settings-panel').style.display = 'flex';
            document.getElementById('home-btn').style.display = 'none';
            document.getElementById('game-stage').innerHTML = '';
            document.getElementById('game-stage').classList.remove('dimmed');
            isTransitioning = false;
        }

        function begin() {
            document.getElementById('settings-panel').style.display = 'none';
            document.getElementById('home-btn').style.display = 'block';
            currentFoods = [...foodLib[cfg.type]].sort(() => Math.random() - 0.5);
            currentIdx = 0;
            spawn();
        }

        function spawn() {
            if (currentIdx >= currentFoods.length) { speak("練習完成！"); setTimeout(goHome, 2500); return; }
            isTransitioning = false;
            const stage = document.getElementById('game-stage');
            stage.classList.remove('dimmed');
            stage.innerHTML = '';
            
            const target = currentFoods[currentIdx];
            lastTarget = target.name;
            document.getElementById('target-name').innerText = target.name;
            speakTask();

            if (cfg.lv === 6) {
                initMatchMode(target);
            } else {
                let items = [target];
                if (cfg.lv === 2) items.push({name:'空白', img:'none'}); 
                if (cfg.lv === 4) {
                    const others = (cfg.type === 'chinese') ? foodLib.western : foodLib.chinese;
                    items.push(others[Math.floor(Math.random()*others.length)]);
                }
                items.sort(() => Math.random() - 0.5).forEach(data => createCard(data, data === target));
            }
        }

        function createCard(data, isCorrect) {
            const card = document.createElement('div');
            card.className = 'food-card';
            if (data.img === 'none') {
                card.innerHTML = '<div style="font-size:7rem; color:#eee">?</div>';
                card.style.borderStyle = 'dashed';
            } else {
                card.innerHTML = `<img src="${data.img}"><div class="progress-bar"></div>`;
            }

            card.onpointerdown = (e) => {
                if (isTransitioning) return;
                if (!isCorrect) { speak("唔係呢個"); return; }
                const bar = card.querySelector('.progress-bar');
                if (bar) {
                    bar.style.transition = `width ${cfg.time}ms linear`;
                    bar.style.width = '100%';
                    gazeTimer = setTimeout(() => {
                        isTransitioning = true;
                        document.getElementById('cheer-sound').play();
                        document.getElementById('game-stage').classList.add('dimmed');
                        card.classList.add('focus-center'); 
                        speak(data.name + "，好叻喎！");
                        setTimeout(() => { currentIdx++; spawn(); }, 3000);
                    }, cfg.time);
                }
            };
            card.onpointerup = card.onpointerleave = () => {
                clearTimeout(gazeTimer);
                if (card.querySelector('.progress-bar')) card.querySelector('.progress-bar').style.width = '0%';
            };
            document.getElementById('game-stage').appendChild(card);
        }

        function initMatchMode(target) {
            const stage = document.getElementById('game-stage');
            const targetBox = document.createElement('div');
            targetBox.className = 'food-card';
            targetBox.style.borderStyle = 'dashed';
            targetBox.style.background = 'rgba(255,255,255,0.1)';
            targetBox.innerHTML = `<img src="${target.img}" style="opacity:0.2;">`;
            
            const dragCard = document.createElement('div');
            dragCard.className = 'food-card';
            dragCard.innerHTML = `<img src="${target.img}">`;
            dragCard.style.zIndex = "100";
            
            stage.appendChild(targetBox);
            stage.appendChild(dragCard);

            let isDragging = false, startX, startY;

            dragCard.onpointerdown = (e) => {
                if (isTransitioning) return;
                isDragging = true;
                dragCard.setPointerCapture(e.pointerId);
                const rect = dragCard.getBoundingClientRect();
                startX = e.clientX - rect.left;
                startY = e.clientY - rect.top;
                dragCard.style.transition = 'none';
            };

            dragCard.onpointermove = (e) => {
                if (!isDragging) return;
                // 使用 transform 代替 top/left 解決 iPad 坐標偏移問題
                const stageRect = stage.getBoundingClientRect();
                const x = e.clientX - stageRect.left - startX;
                const y = e.clientY - stageRect.top - startY;
                dragCard.style.position = 'absolute';
                dragCard.style.left = x + 'px';
                dragCard.style.top = y + 'px';
            };

            dragCard.onpointerup = (e) => {
                if (!isDragging) return;
                isDragging = false;
                dragCard.style.transition = 'all 0.3s';
                
                const boxRect = targetBox.getBoundingClientRect();
                // 判斷手指放開的位置是否在目標框內
                if (e.clientX > boxRect.left && e.clientX < boxRect.right && e.clientY > boxRect.top && e.clientY < boxRect.bottom) {
                    isTransitioning = true;
                    // 自動吸附到目標框位置
                    const stageRect = stage.getBoundingClientRect();
                    dragCard.style.left = (boxRect.left - stageRect.left) + 'px';
                    dragCard.style.top = (boxRect.top - stageRect.top) + 'px';
                    
                    document.getElementById('cheer-sound').play();
                    speak("配對成功！");
                    setTimeout(() => { currentIdx++; spawn(); }, 3000);
                } else {
                    // 回到原位
                    dragCard.style.position = 'relative';
                    dragCard.style.left = '0';
                    dragCard.style.top = '0';
                    speak("將圖片放進去");
                }
            };
        }
    </script>
</body>
</html>
