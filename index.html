<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yum Yum Food</title>
    <style>
        :root { --primary: #FF9500; --success: #28a745; --gaze: #ffeb3b; }
        * { -webkit-touch-callout: none; -webkit-user-select: none; touch-action: none; box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        #bg-layer { position: absolute; inset: 0; background-size: cover; background-position: center; z-index: 1; filter: brightness(0.4) blur(2px); transition: background-image 0.5s; }
        #task-hint { position: absolute; top: 0; left: 0; width: 100%; height: 120px; background: rgba(255,255,255,0.95); color: #000; display: flex; justify-content: center; align-items: center; font-size: 3.5rem; font-weight: bold; z-index: 100; border-bottom: 8px solid var(--primary); }
        #target-container { position: absolute; display: none; z-index: 50; background: white; border-radius: 40px; border: 15px solid var(--primary); padding: 20px; box-shadow: 0 0 60px rgba(255,255,255,0.9); transition: transform 0.3s; }
        #food-img { display: block; width: 100%; height: auto; border-radius: 20px; }
        .progress-bar { position: absolute; bottom: -40px; left: 0; width: 0%; height: 25px; background: var(--gaze); border-radius: 12px; }
        #settings-panel { position: fixed; inset: 0; background: #fdf6e3; z-index: 1001; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .big-btn { width: 85%; padding: 45px; margin: 25px; font-size: 3rem; border-radius: 30px; border: 8px solid #fff; cursor: pointer; color: white; font-weight: bold; }
    </style>
</head>
<body>
    <audio id="cheer-sound" src="cheer.mp3"></audio>
    <div id="task-hint">找出：<span id="target-name">---</span></div>
    <div id="bg-layer"></div>
    <div id="target-container">
        <img id="food-img" src="">
        <div class="progress-bar" id="gaze-bar"></div>
    </div>
    <div id="settings-panel">
        <button class="big-btn" style="background: #d35400;" onclick="startGame('chinese')">🍱 中式點心</button>
        <button class="big-btn" style="background: #2980b9;" onclick="startGame('western')">🍔 西式快餐</button>
    </div>

    <script>
        const config = {
            'chinese': {
                bg: 'chinese_bg.jpg', 
                data: [
                    { name: '牛肉球', img: 'food1.png' },
                    { name: '腸粉', img: 'food2.png' },
                    { name: '叉燒包', img: 'food3.png' },
                    { name: '白粥', img: 'food4.png' }
                ]
            },
            'western': {
                bg: 'western_bg.jpg', 
                data: [
                    { name: '薄餅', img: 'pizza.png' },
                    { name: '漢堡包', img: '1food.png' },
                    { name: '薯條', img: '2food.png' },
                    { name: '可樂', img: 'cola.png' }
                ]
            }
        };

        let currentList = [];
        let currentIndex = 0;
        let gazeTimer = null;

        function startGame(type) {
            document.getElementById('settings-panel').style.display = 'none';
            document.getElementById('bg-layer').style.backgroundImage = `url(${config[type].bg})`;
            currentList = [...config[type].data].sort(() => Math.random() - 0.5);
            currentIndex = 0;
            spawn();
        }

        function spawn() {
            if (currentIndex >= currentList.length) {
                setTimeout(() => { document.getElementById('settings-panel').style.display = 'flex'; }, 1000);
                return;
            }
            const item = currentList[currentIndex];
            document.getElementById('target-name').innerText = item.name;
            const img = document.getElementById('food-img');
            const container = document.getElementById('target-container');
            const bar = document.getElementById('gaze-bar');
            
            img.src = item.img;
            container.style.display = 'none';
            bar.style.width = '0%';
            bar.style.transition = 'none';

            img.onload = () => {
                const size = 400;
                container.style.width = size + 'px';
                const maxX = window.innerWidth - size - 60;
                const maxY = window.innerHeight - size - 180;
                container.style.left = (Math.random() * maxX + 30) + 'px';
                container.style.top = (Math.random() * maxY + 140) + 'px';
                container.style.display = 'block';
            };
        }

        const cont = document.getElementById('target-container');
        cont.onpointerenter = () => {
            const bar = document.getElementById('gaze-bar');
            bar.style.transition = "width 1500ms linear";
            bar.style.width = "100%";
            gazeTimer = setTimeout(() => {
                document.getElementById('cheer-sound').play();
                cont.style.transform = "scale(1.2)";
                setTimeout(() => {
                    cont.style.transform = "scale(1)";
                    currentIndex++;
                    spawn();
                }, 1000);
            }, 1500);
        };
        cont.onpointerleave = () => {
            clearTimeout(gazeTimer);
            const bar = document.getElementById('gaze-bar');
            bar.style.transition = "none";
            bar.style.width = "0%";
        };
    </script>
</body>
</html>
